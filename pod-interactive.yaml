apiVersion: apps/v1
kind: Deployment
metadata:
  name: avgspeed1-app
  labels:
    app: avgspeed1-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: avgspeed1-app
  template:
    metadata:
      labels:
        app: avgspeed1-app
    spec:
      containers:
        - name: avgspeed1-app
          image: avgspeed-pod-app:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Djava.awt.headless=true -Dprism.order=sw"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"